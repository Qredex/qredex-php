name: Auto-release

on:
  push:
    branches:
      - main
    paths:
      - 'src/Qredex.php'

permissions:
  contents: write

concurrency:
  group: auto-release
  cancel-in-progress: false

jobs:
  detect-and-tag:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract SDK_VERSION from source
        id: version
        run: |
          VERSION=$(grep -oP "public const SDK_VERSION = '\K[0-9]+\.[0-9]+\.[0-9]+(?=')" src/Qredex.php)

          if [[ -z "${VERSION}" ]]; then
            echo "Could not extract SDK_VERSION from src/Qredex.php." >&2
            exit 1
          fi

          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Detected SDK_VERSION=${VERSION} (tag=${TAG})"

      - name: Check whether tag already exists
        id: check
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists. Nothing to do."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "Tag ${TAG} does not exist. Will create."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push release tag
        if: steps.check.outputs.exists == 'false'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"
          echo "Created and pushed ${TAG}"
