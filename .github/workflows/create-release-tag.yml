name: Create release tag
run-name: >-
  Create release tag ${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: Semantic version to tag, with or without a leading v.
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: create-release-tag-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tag-release:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Normalize version
        id: version
        shell: bash
        run: |
          RAW="${{ inputs.version }}"
          NORMALIZED="${RAW#v}"

          if [[ ! "$NORMALIZED" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must be a semantic version such as 0.2.0 or v0.2.0." >&2
            exit 1
          fi

          echo "tag=v${NORMALIZED}" >> "$GITHUB_OUTPUT"

      - name: Check whether release tag already exists
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Release tag ${TAG} already exists." >&2
            exit 1
          fi

      - name: Create and push release tag
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"
