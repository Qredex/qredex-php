name: Live tests

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Live API environment to target.
        required: true
        default: staging
        type: choice
        options:
          - production
          - staging
          - development

permissions:
  contents: read

concurrency:
  group: live-tests-${{ github.ref }}
  cancel-in-progress: false

jobs:
  live:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      QREDEX_LIVE_ENABLED: '1'
      QREDEX_LIVE_ENVIRONMENT: ${{ inputs.environment }}
      QREDEX_LIVE_CLIENT_ID: ${{ secrets.QREDEX_LIVE_CLIENT_ID }}
      QREDEX_LIVE_CLIENT_SECRET: ${{ secrets.QREDEX_LIVE_CLIENT_SECRET }}
      QREDEX_LIVE_STORE_ID: ${{ secrets.QREDEX_LIVE_STORE_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup ota
        uses: ota-run/setup@v1
        with:
          ota-version: 1.5.2

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none
          tools: composer:v2

      - name: Validate live test secrets
        shell: bash
        run: |
          for key in QREDEX_LIVE_CLIENT_ID QREDEX_LIVE_CLIENT_SECRET QREDEX_LIVE_STORE_ID; do
            if [[ -z "${!key}" ]]; then
              echo "Missing required GitHub Actions secret: ${key}" >&2
              exit 1
            fi
          done

      - name: Validate ota contract
        run: ota validate

      - name: Run live tests
        run: ota run test:live
