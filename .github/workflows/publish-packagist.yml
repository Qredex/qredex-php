name: Publish release
run-name: >-
  Publish release from ${{ github.event.inputs.release_ref || github.ref_name }}

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release_ref:
        description: Existing release tag or commit to publish with the latest workflow.
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: publish-release-${{ github.event.inputs.release_ref || github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.release_ref || github.ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer:v2

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          git fetch --force --tags origin

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 || true)"
          fi

          if [[ -z "${TAG}" ]]; then
            echo "No semantic version release tag points at this ref; skipping release publish."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_publish=true" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Skip non-release ref
        if: steps.release.outputs.should_publish != 'true'
        run: echo "Skipping publish because this ref is not a release tag."

      - name: Validate composer.json
        if: steps.release.outputs.should_publish == 'true'
        run: composer validate --strict

      - name: Install dependencies
        if: steps.release.outputs.should_publish == 'true'
        run: composer install --no-interaction --prefer-dist

      - name: Run tests
        if: steps.release.outputs.should_publish == 'true'
        run: composer test

      - name: Run static analysis
        if: steps.release.outputs.should_publish == 'true'
        run: composer analyse

      - name: Package smoke test
        if: steps.release.outputs.should_publish == 'true'
        run: composer install --no-interaction --prefer-dist --no-dev

      - name: Create GitHub Release
        if: steps.release.outputs.should_publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${{ steps.release.outputs.tag }}" >/dev/null 2>&1 || \
          gh release create "${{ steps.release.outputs.tag }}" --generate-notes

      - name: Notify Packagist
        if: steps.release.outputs.should_publish == 'true'
        env:
          PACKAGIST_WEBHOOK_URL: ${{ secrets.PACKAGIST_WEBHOOK_URL }}
        run: |
          if [[ -n "${PACKAGIST_WEBHOOK_URL}" ]]; then
            if curl --fail --silent --show-error -X POST "$PACKAGIST_WEBHOOK_URL"; then
              echo "Packagist notified."
            else
              echo "::warning::Packagist webhook failed. The GitHub release was created. Update Packagist manually if needed."
            fi
          else
            echo "PACKAGIST_WEBHOOK_URL is not configured. Skipping Packagist notification."
          fi
