name: Bug Report
description: Report a reproducible problem in the Qredex PHP SDK.
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the observed behavior and the expected behavior.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Share the smallest code sample or request flow that reproduces the problem.
    validations:
      required: true
  - type: input
    id: php_version
    attributes:
      label: PHP version
      description: "Example: 8.2.17"
    validations:
      required: true
  - type: input
    id: sdk_version
    attributes:
      label: SDK version
      description: "Example: 0.2.0"
    validations:
      required: true
